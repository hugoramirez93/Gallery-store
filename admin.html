<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMINA – Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-body { background: #f5f3f0; }
    .admin-login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .admin-login-box {
      background: white; padding: 48px; border-radius: var(--radius);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 400px;
    }
    .admin-login-box h1 {
      font-family: var(--font-serif); text-align: center;
      font-size: 1.8rem; font-weight: 300; margin-bottom: 8px;
    }
    .admin-login-box p { text-align: center; color: var(--color-text-light); font-size: 0.85rem; margin-bottom: 32px; }
    .admin-login-box input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--color-border);
      border-radius: 2px; font-size: 0.9rem; margin-bottom: 16px;
    }
    .admin-login-box input:focus { outline: none; border-color: var(--color-accent); }
    .admin-login-box .error { color: var(--color-error); font-size: 0.8rem; text-align: center; margin-top: 12px; display: none; }

    .admin-panel { display: none; }
    .admin-nav {
      background: var(--color-bg-alt); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-nav h2 { font-family: var(--font-serif); color: var(--color-text-inverse); font-weight: 300; letter-spacing: 2px; }
    .admin-nav .admin-user { color: rgba(250,248,245,0.6); font-size: 0.85rem; }
    .admin-nav .btn-sm { background: transparent; color: rgba(250,248,245,0.6); border-color: rgba(250,248,245,0.2); }
    .admin-nav .btn-sm:hover { color: white; border-color: white; }

    .admin-content { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .admin-header h3 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 300; }

    .admin-table-wrap { overflow-x: auto; background: white; border-radius: var(--radius); box-shadow: var(--shadow-sm); }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .admin-table th { text-align: left; padding: 14px 16px; background: #faf8f5; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-light); border-bottom: 1px solid var(--color-border); }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table .thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; background: var(--color-border); }
    .admin-table .actions { display: flex; gap: 8px; }
    .admin-table .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 500; }
    .badge-avail { background: #d8f5e0; color: #1a7a3a; }
    .badge-unavail { background: #f5e0d8; color: #9b2226; }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: var(--radius); padding: 40px;
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform var(--transition);
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal h3 { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 24px; }
    .modal .form-group { margin-bottom: 16px; }
    .modal label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; color: var(--color-text-light); text-transform: uppercase; letter-spacing: 0.5px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--color-border);
      border-radius: 2px; font-size: 0.9rem;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--color-accent); }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal .form-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-login" id="loginView">
    <div class="admin-login-box">
      <h1>LUMINA</h1>
      <p>Admin Panel • Sign in</p>
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" required autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" required autocomplete="current-password">
        <button class="btn btn-primary btn-full" type="submit">Sign In</button>
        <div class="error" id="loginError">Invalid credentials</div>
      </form>
    </div>
  </div>

  <div class="admin-panel" id="panelView">
    <nav class="admin-nav">
      <h2>LUMINA • Admin</h2>
      <div style="display:flex;align-items:center;gap:16px">
        <span class="admin-user" id="adminUserDisplay"></span>
        <button class="btn btn-sm" id="logoutBtn">Sign Out</button>
      </div>
    </nav>

    <div class="admin-content">
      <div class="admin-header">
        <h3>Manage Products</h3>
        <button class="btn btn-primary btn-sm" id="addProductBtn">+ Add Product</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--color-text-light)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Add Product</h3>
      <form id="productForm">
        <div class="form-group">
          <label>Painting Name</label>
          <input type="text" id="formName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="formDesc" required></textarea>
        </div>
        <div class="form-group">
          <label>Price (USD)</label>
          <input type="number" id="formPrice" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label>Image File</label>
          <input type="file" id="formImage" accept="image/*">
          <small style="color:var(--color-text-light);font-size:0.75rem">Leave empty to keep existing (when editing)</small>
        </div>
        <div class="form-group">
          <label>Available</label>
          <select id="formAvailable">
            <option value="1">Available</option>
            <option value="0">Unavailable</option>
          </select>
        </div>
        <input type="hidden" id="formId" value="">
        <div class="form-actions">
          <button type="button" class="btn btn-outline-dark btn-sm" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm" id="modalSubmit">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
