<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful – LUMINA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .result-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; background: var(--color-bg); }

    .result-icon { font-size: 4rem; color: var(--color-accent); margin-bottom: 16px; }
    .result-box h1 { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 300; margin-bottom: 12px; }
    .result-box p { color: var(--color-text-light); margin-bottom: 32px; font-size: 1rem; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="result-page">
    <div class="result-box">
      <div class="result-icon">✓</div>
      <h1>Thank You</h1>
      <p>Your payment was successful. You will receive a confirmation email with your order details shortly.</p>
      <a href="/" class="btn btn-primary">Return to Gallery</a>
    </div>
  </div>
